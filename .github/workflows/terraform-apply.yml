name: "Terraform Apply"

on:
  workflow_call:
    inputs:
      target_env:
        required: true
        type: string
      working_directory:
        required: true
        type: string
      plan_commit_sha:
        required: true
        type: string
      plan_artifact_name:
        required: true
        type: string
      change_ref:
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  apply:
    name: "Apply - ${{ inputs.target_env }} | ${{ inputs.change_ref }}"
    runs-on: windows-latest
    environment: ${{ inputs.target_env }}
    timeout-minutes: 60

    env:
      # Backend configuration
      BACKEND_SUB_ID: ${{ secrets.BACKEND_SUBSCRIPTION_ID }}
      STG_NAME: ${{ secrets.BACKEND_STORAGE_ACCOUNT_NAME }}
      STG_CONT: ${{ secrets.BACKEND_CONTAINER_NAME }}
      RG_NAME: ${{ secrets.BACKEND_RESOURCE_GROUP }}

      # OIDC auth
      ARM_USE_OIDC: "true"
      ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}

      TF_INPUT: "0"
      TF_IN_AUTOMATION: "true"

    steps:
      - name: Checkout exact planned commit
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.plan_commit_sha }}
          
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false      

      - name: Download plan file
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.plan_artifact_name }}
          path: ${{ inputs.working_directory }}

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.ARM_CLIENT_ID }}
          tenant-id: ${{ secrets.ARM_TENANT_ID }}
          subscription-id: ${{ secrets.ARM_SUBSCRIPTION_ID }}

      - name: Terraform init
        shell: powershell
        working-directory: ${{ inputs.working_directory }}
        env:
          ARM_SUBSCRIPTION_ID: ${{ env.BACKEND_SUB_ID }}
        run: |
          terraform init `
            -backend-config="subscription_id=$env:BACKEND_SUB_ID" `
            -backend-config="storage_account_name=$env:STG_NAME" `
            -backend-config="container_name=$env:STG_CONT" `
            -backend-config="resource_group_name=$env:RG_NAME" `
            -reconfigure

      - name: Terraform apply from saved plan
        shell: powershell
        working-directory: ${{ inputs.working_directory }}
        env:
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
        run: |
          $ErrorActionPreference = 'Stop'

          if (Test-Path "tfplan.binary") {
            terraform apply -auto-approve "tfplan.binary"
          } else {
            throw "Error: Plan file 'tfplan.binary' not found."
          }

      - name: Post-apply evidence
        shell: powershell
        run: |
          "## Apply completed" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          "- Environment: ${{ inputs.target_env }}" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          "- Ticket: ${{ inputs.change_ref }}" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          "- Commit: ${{ inputs.plan_commit_sha }}" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          "- Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
