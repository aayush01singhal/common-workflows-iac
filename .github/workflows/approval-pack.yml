name: "Approval Pack"
 
on:
  workflow_call:
    inputs:
      target_env:
        required: true
        type: string
      change_ref:
        required: true
        type: string
      change_reason:
        required: true
        type: string
      rollback_plan:
        required: true
        type: string
      plan_artifact_name:
        required: true
        type: string
      working_directory:
        required: true
        type: string
 
permissions:
  contents: read
 
jobs:
  pack:
    name: "Approval Pack | env=${{ inputs.target_env }} | ref=${{ inputs.change_ref }}"
    runs-on: windows-latest
    timeout-minutes: 30
 
    steps:
      - name: Download approval pack artifact
        uses: actions/download-artifact@v4
        with:
          name: "${{ inputs.plan_artifact_name }}-approval-pack"
          path: evidence
 
      - name: Download plan stats artifact
        uses: actions/download-artifact@v4
        with:
          name: "${{ inputs.plan_artifact_name }}-stats"
          path: evidence
 
      - name: Download plan preview artifact
        uses: actions/download-artifact@v4
        with:
          name: "${{ inputs.plan_artifact_name }}-preview"
          path: evidence
 
      - name: Publish approval pack to job summary (pre-approval)
        shell: powershell
        run: |
          $runUrl = "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
 
          "## APPROVAL PACK (review before approving)" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY
          "" | Out-File -Append $env:GITHUB_STEP_SUMMARY
          "- Target environment: **${{ inputs.target_env }}**" | Out-File -Append $env:GITHUB_STEP_SUMMARY
          "- Change reference: **${{ inputs.change_ref }}**" | Out-File -Append $env:GITHUB_STEP_SUMMARY
          "- Reason: ${{ inputs.change_reason }}" | Out-File -Append $env:GITHUB_STEP_SUMMARY
          "- Rollback: ${{ inputs.rollback_plan }}" | Out-File -Append $env:GITHUB_STEP_SUMMARY
          "- Requested by: @${{ github.actor }}" | Out-File -Append $env:GITHUB_STEP_SUMMARY
          "- Workflow run: $runUrl" | Out-File -Append $env:GITHUB_STEP_SUMMARY
          "" | Out-File -Append $env:GITHUB_STEP_SUMMARY
 
          if (Test-Path "evidence\plan_stats.json") {
            $stats = Get-Content -Raw "evidence\plan_stats.json" | ConvertFrom-Json
            "### Terraform plan counts" | Out-File -Append $env:GITHUB_STEP_SUMMARY
            "" | Out-File -Append $env:GITHUB_STEP_SUMMARY
            "- Adds: **$($stats.adds)**" | Out-File -Append $env:GITHUB_STEP_SUMMARY
            "- Changes: **$($stats.changes)**" | Out-File -Append $env:GITHUB_STEP_SUMMARY
            "- Destroys: **$($stats.destroys)**" | Out-File -Append $env:GITHUB_STEP_SUMMARY
            "- Replaces: **$($stats.replaces)**" | Out-File -Append $env:GITHUB_STEP_SUMMARY
            "" | Out-File -Append $env:GITHUB_STEP_SUMMARY
          }
 
          "### Plan preview (first 250 lines)" | Out-File -Append $env:GITHUB_STEP_SUMMARY
          "" | Out-File -Append $env:GITHUB_STEP_SUMMARY
          "```" | Out-File -Append $env:GITHUB_STEP_SUMMARY
          if (Test-Path "evidence\plan_preview.txt") {
            Get-Content "evidence\plan_preview.txt" -TotalCount 250 | Out-File -Append $env:GITHUB_STEP_SUMMARY
          } else {
            "plan_preview.txt not found." | Out-File -Append $env:GITHUB_STEP_SUMMARY
          }
          "```" | Out-File -Append $env:GITHUB_STEP_SUMMARY
 
          "" | Out-File -Append $env:GITHUB_STEP_SUMMARY
          "### Evidence artifacts" | Out-File -Append $env:GITHUB_STEP_SUMMARY
          "- ${{ inputs.plan_artifact_name }} (tfplan.binary)" | Out-File -Append $env:GITHUB_STEP_SUMMARY
          "- ${{ inputs.plan_artifact_name }}-preview (plan_preview.txt)" | Out-File -Append $env:GITHUB_STEP_SUMMARY
          "- ${{ inputs.plan_artifact_name }}-json (tfplan.json)" | Out-File -Append $env:GITHUB_STEP_SUMMARY
          "- ${{ inputs.plan_artifact_name }}-stats (plan_stats.json)" | Out-File -Append $env:GITHUB_STEP_SUMMARY
          "- ${{ inputs.plan_artifact_name }}-approval-pack (approval_pack.md)" | Out-File -Append $env:GITHUB_STEP_SUMMARY
