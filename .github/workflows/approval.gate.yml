name: "Approval Gate"
 
on:
  workflow_call:
    inputs:
      target_env:
        required: true
        type: string
      change_ref:
        required: true
        type: string
      change_reason:
        required: true
        type: string
 
permissions:
  contents: read
 
jobs:
  approval:
    name: "Approval - ${{ inputs.target_env }}"
    runs-on: windows-latest
    timeout-minutes: 1440
 
    environment: ${{ inputs.target_env }}
 
    steps:
      - name: Approval context
        shell: powershell
        run: |
          "## Approval Required" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY
          "" | Out-File -Append $env:GITHUB_STEP_SUMMARY
          "- Target environment: ${{ inputs.target_env }}" | Out-File -Append $env:GITHUB_STEP_SUMMARY
          "- Change reference: ${{ inputs.change_ref }}" | Out-File -Append $env:GITHUB_STEP_SUMMARY
          "- Reason: ${{ inputs.change_reason }}" | Out-File -Append $env:GITHUB_STEP_SUMMARY
          "- Requested by: @${{ github.actor }}" | Out-File -Append $env:GITHUB_STEP_SUMMARY
