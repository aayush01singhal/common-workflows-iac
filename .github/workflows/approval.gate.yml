
name: Approval gate

on:
  workflow_call:
    inputs:
      target_env:
        required: true
        type: string
      change_ref:
        required: true
        type: string
      change_reason:
        required: true
        type: string

permissions:
  contents: read

jobs:
  approval:
    runs-on: [self-hosted, Windows]
    environment: approver
    timeout-minutes: 1440

    steps:
      - shell: powershell
        run: |
          Write-Host "Awaiting approval"
          Write-Host "Env: ${{ inputs.target_env }}"
          Write-Host "Ticket: ${{ inputs.change_ref }}"
          Write-Host "Reason: ${{ inputs.change_reason }}"
