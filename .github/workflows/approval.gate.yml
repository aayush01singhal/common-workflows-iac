name: Approval gate

on:
  workflow_call:
    inputs:
      target_env:
        description: Environment for which approval is required
        required: true
        type: string

permissions:
  contents: read

jobs:
  approval:
    name: Manual Approval
    runs-on: windows-latest

    # ✅ GitHub Environment based approval
    environment:
      name: ${{ inputs.target_env }}

    timeout-minutes: 1440   # 24 hours approval window

    steps:
      - name: Waiting for approval
        run: |
          echo "Waiting for manual approval for environment: ${{ inputs.target_env }}"
``
