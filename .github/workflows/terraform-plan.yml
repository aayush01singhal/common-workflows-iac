# .github/workflows/terraform-plan.yml
name: "Terraform Plan"
 
on:
  workflow_call:
    inputs:
      target_env:
        required: true
        type: string
      selected_branch:
        required: true
        type: string
      working_directory:
        required: true
        type: string
      change_ref:
        required: true
        type: string
      change_reason:
        required: true
        type: string
      rollback_plan:
        required: true
        type: string
      plan_artifact_name:
        required: true
        type: string
    outputs:
      plan_commit_sha:
        value: ${{ jobs.plan.outputs.plan_commit_sha }}
      plan_artifact_name:
        value: ${{ jobs.plan.outputs.plan_artifact_name }}
 
permissions:
  contents: read
  id-token: write
 
jobs:
  plan:
    name: "Plan - ${{ inputs.target_env }} | ${{ inputs.change_ref }}"
    runs-on: windows-latest
    environment: ${{ inputs.target_env }}
    timeout-minutes: 60
 
    outputs:
      plan_commit_sha: ${{ steps.capture_sha.outputs.sha }}
      plan_artifact_name: ${{ inputs.plan_artifact_name }}
 
    env:
      BACKEND_SUB_ID: ${{ secrets.BACKEND_SUBSCRIPTION_ID }}
      STG_NAME: ${{ secrets.BACKEND_STORAGE_ACCOUNT_NAME }}
      STG_CONT: ${{ secrets.BACKEND_CONTAINER_NAME }}
      RG_NAME: ${{ secrets.BACKEND_RESOURCE_GROUP }}
 
      ARM_USE_OIDC: "true"
      ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
 
      TF_INPUT: "0"
      TF_IN_AUTOMATION: "true"
 
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.selected_branch }}
 
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false
 
      - name: Capture exact commit SHA
        id: capture_sha
        shell: powershell
        run: |
         & "$env:GITHUB_WORKSPACE\.github\scripts\capture-sha.ps1"
 
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.ARM_CLIENT_ID }}
          tenant-id: ${{ secrets.ARM_TENANT_ID }}
          subscription-id: ${{ secrets.ARM_SUBSCRIPTION_ID }}
 
      - name: Publish approval context
        shell: powershell
        run: |
          & "$env:GITHUB_WORKSPACE\.github\scripts\publish-approval-context.ps1" `
          -TargetEnv "${{ inputs.target_env }}"
          -ChangeRef "${{ inputs.change_ref }}"
          -ChangeReason "${{ inputs.change_reason }}"
          -RollbackPlan "${{ inputs.rollback_plan }}"
 
      - name: Terraform init (backend)
        shell: powershell
        working-directory: ${{ inputs.working_directory }}
        env:
          ARM_SUBSCRIPTION_ID: ${{ env.BACKEND_SUB_ID }}
        run: |
         & "$env:GITHUB_WORKSPACE\.github\scripts\terraform-init.ps1"
 
      - name: Terraform plan and evidence generation
        shell: powershell
        working-directory: ${{ inputs.working_directory }}
        run: |
          & "$env:GITHUB_WORKSPACE\.github\scripts\terraform-plan-evidence.ps1" `
          -TargetEnv "${{ inputs.target_env }}"
          -ChangeRef "${{ inputs.change_ref }}"
          -ChangeReason "${{ inputs.change_reason }}"
          -RollbackPlan "${{ inputs.rollback_plan }}"
          -SelectedBranch "${{ inputs.selected_branch }}"
          -PlanArtifactName "${{ inputs.plan_artifact_name }}"
          -Repository "${{ github.repository }}"
          -RunId "${{ github.run_id }}"
          -Actor "${{ github.actor }}"
          -CommitSha "${{ steps.capture_sha.outputs.sha }}"
 
      - name: Upload plan file
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.plan_artifact_name }}
          path: ${{ inputs.working_directory }}/tfplan.binary
          retention-days: 1
 
      - name: Upload plan preview (evidence)
        uses: actions/upload-artifact@v4
        with:
          name: "${{ inputs.plan_artifact_name }}-preview"
          path: ${{ inputs.working_directory }}/plan_preview.txt
          retention-days: 7
 
      - name: Upload plan JSON (evidence)
        uses: actions/upload-artifact@v4
        with:
          name: "${{ inputs.plan_artifact_name }}-json"
          path: ${{ inputs.working_directory }}/tfplan.json
          retention-days: 7
 
      - name: Upload approval pack
        uses: actions/upload-artifact@v4
        with:
          name: "${{ inputs.plan_artifact_name }}-approval-pack"
          path: ${{ inputs.working_directory }}/approval_pack.md
          retention-days: 7
 
      - name: Upload plan stats
        uses: actions/upload-artifact@v4
        with:
          name: "${{ inputs.plan_artifact_name }}-stats"
          path: ${{ inputs.working_directory }}/plan_stats.json
          retention-days: 7
