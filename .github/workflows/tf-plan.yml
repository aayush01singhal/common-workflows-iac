name: "Terraform Plan"
 
on:
  workflow_call:
    inputs:
      target_env:
        required: true
        type: string
      selected_branch:
        required: true
        type: string
      working_directory:
        required: true
        type: string
      change_ref:
        required: true
        type: string
      change_reason:
        required: true
        type: string
      rollback_plan:
        required: true
        type: string
    outputs:
      plan_commit_sha:
        description: "Exact commit SHA used to generate the plan"
        value: ${{ jobs.plan.outputs.plan_commit_sha }}
      plan_artifact_name:
        description: "Artifact name containing tfplan.binary"
        value: ${{ jobs.plan.outputs.plan_artifact_name }}
 
permissions:
  contents: read
  id-token: write
 
jobs:
  plan:
    name: "Plan - ${{ inputs.target_env }} | ${{ inputs.change_ref }}"
    runs-on: windows-latest
    environment: ${{ inputs.target_env }}
    timeout-minutes: 60
 
    outputs:
      plan_commit_sha: ${{ steps.capture_sha.outputs.sha }}
      plan_artifact_name: ${{ steps.name_artifact.outputs.art_name }}
 
    env:
      # Backend
      BACKEND_SUB_ID: ${{ secrets.BACKEND_SUBSCRIPTION_ID }}
      STG_NAME: ${{ secrets.BACKEND_STORAGE_ACCOUNT_NAME }}
      STG_CONT: ${{ secrets.BACKEND_CONTAINER_NAME }}
      RG_NAME: ${{ secrets.BACKEND_RESOURCE_GROUP }}
 
      # OIDC
      ARM_USE_OIDC: "true"
      ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
 
      TF_INPUT: "0"
      TF_IN_AUTOMATION: "true"
 
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.selected_branch }}
         
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false
 
      - name: Capture exact commit SHA
        id: capture_sha
        shell: powershell
        run: |
          $sha = (git rev-parse HEAD).Trim()
          echo "sha=$sha" >> $env:GITHUB_OUTPUT
 
      - name: Name plan artifact
        id: name_artifact
        shell: powershell
        run: |
          echo "art_name=tf-plan-${{ inputs.target_env }}-${{ github.run_id }}" >> $env:GITHUB_OUTPUT
 
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.ARM_CLIENT_ID }}
          tenant-id: ${{ secrets.ARM_TENANT_ID }}
          subscription-id: ${{ secrets.ARM_SUBSCRIPTION_ID }}
 
      - name: Approval context (summary)
        shell: powershell
        run: |
          "## Deployment request" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          "" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          "- Environment: ${{ inputs.target_env }}" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          "- Ticket: ${{ inputs.change_ref }}" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          "- Reason: ${{ inputs.change_reason }}" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          "- Rollback: ${{ inputs.rollback_plan }}" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          "- Actor: @${{ github.actor }}" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          "- Ref: ${{ github.ref }}" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          "- Commit: ${{ github.sha }}" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
 
      - name: Terraform init (backend)
        shell: powershell
        working-directory: ${{ inputs.working_directory }}
        env:
          ARM_SUBSCRIPTION_ID: ${{ env.BACKEND_SUB_ID }}
        run: |
          terraform init `
            -backend-config="subscription_id=$env:BACKEND_SUB_ID" `
            -backend-config="storage_account_name=$env:STG_NAME" `
            -backend-config="container_name=$env:STG_CONT" `
            -backend-config="resource_group_name=$env:RG_NAME" `
            -reconfigure
 
      - name: Terraform validate, fmt check, plan (generate evidence)
        shell: powershell
        working-directory: ${{ inputs.working_directory }}
        run: |
          $ErrorActionPreference = 'Stop'
 
          terraform version
          terraform fmt -check
          terraform validate
 
          terraform plan -out="tfplan.binary"
 
          # Human readable preview (safe: Terraform redacts sensitive values)
          terraform show -no-color "tfplan.binary" > plan_preview.txt
 
          # Machine readable JSON (for computing stats)
          terraform show -json "tfplan.binary" > tfplan.json
 
          # Compute add/change/destroy counts from resource_changes
          $plan = Get-Content -Raw -Path "tfplan.json" | ConvertFrom-Json
 
          $add = 0; $change = 0; $destroy = 0; $replace = 0
 
          if ($null -ne $plan.resource_changes) {
            foreach ($rc in $plan.resource_changes) {
              $actions = $rc.change.actions
              if ($actions -contains "create") { $add++ }
              if ($actions -contains "update") { $change++ }
              if ($actions -contains "delete") { $destroy++ }
              # replace is typically ["delete","create"]
              if (($actions -contains "delete") -and ($actions -contains "create")) { $replace++ }
            }
          }
 
          $stats = [ordered]@{
            environment = "${{ inputs.target_env }}"
            change_ref  = "${{ inputs.change_ref }}"
            commit_sha  = "${{ steps.capture_sha.outputs.sha }}"
            branch      = "${{ inputs.selected_branch }}"
            adds        = $add
            changes     = $change
            destroys    = $destroy
            replaces    = $replace
            generated_at_utc = (Get-Date).ToUniversalTime().ToString("s") + "Z"
          }
 
          $stats | ConvertTo-Json -Depth 5 | Out-File -FilePath "plan_stats.json" -Encoding utf8
 
          # Build an approval pack markdown
          $runUrl = "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          $pack = @()
          $pack += "# Approval Pack"
          $pack += ""
          $pack += "## Request"
          $pack += "- Target environment: **${{ inputs.target_env }}**"
          $pack += "- Change reference: **${{ inputs.change_ref }}**"
          $pack += "- Reason: ${{ inputs.change_reason }}"
          $pack += "- Rollback plan: ${{ inputs.rollback_plan }}"
          $pack += ""
          $pack += "## Source"
          $pack += "- Repo: `${{ github.repository }}`"
          $pack += "- Branch: `${{ inputs.selected_branch }}`"
          $pack += "- Commit SHA (planned): `${{ steps.capture_sha.outputs.sha }}`"
          $pack += "- Actor: `@${{ github.actor }}`"
          $pack += "- Workflow run: $runUrl"
          $pack += ""
          $pack += "## Terraform Plan Summary"
          $pack += "- Adds: **$add**"
          $pack += "- Changes: **$change**"
          $pack += "- Destroys: **$destroy**"
          $pack += "- Replaces: **$replace**"
          $pack += ""
          $pack += "## Evidence"
          $pack += "- Artifact: `tfplan.binary` (used later for apply)"
          $pack += "- Artifact: `plan_preview.txt` (full plan preview)"
          $pack += "- Artifact: `tfplan.json` + `plan_stats.json` (structured evidence)"
          $pack += ""
          $pack += "## Plan Preview (excerpt)"
          $pack += "```"
          $previewLines = Get-Content -Path "plan_preview.txt" -TotalCount 300
          $pack += $previewLines
          $pack += "```"
          $pack -join "`n" | Out-File -FilePath "approval_pack.md" -Encoding utf8
 
          # Also write a concise summary into the workflow summary
          "## Terraform plan summary" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          "" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          "- Adds: **$add**" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          "- Changes: **$change**" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          "- Destroys: **$destroy**" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          "- Replaces: **$replace**" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          "" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          "See Approval Pack artifact for full context." | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
 
      - name: Upload plan file
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.name_artifact.outputs.art_name }}
          path: ${{ inputs.working_directory }}/tfplan.binary
          retention-days: 1
 
      - name: Upload plan preview (evidence)
        uses: actions/upload-artifact@v4
        with:
          name: "${{ steps.name_artifact.outputs.art_name }}-preview"
          path: ${{ inputs.working_directory }}/plan_preview.txt
          retention-days: 7
 
      - name: Upload plan JSON (evidence)
        uses: actions/upload-artifact@v4
        with:
          name: "${{ steps.name_artifact.outputs.art_name }}-json"
          path: ${{ inputs.working_directory }}/tfplan.json
          retention-days: 7
 
      - name: Upload approval pack (markdown)
        uses: actions/upload-artifact@v4
        with:
          name: "${{ steps.name_artifact.outputs.art_name }}-approval-pack"
          path: ${{ inputs.working_directory }}/approval_pack.md
          retention-days: 7
 
      - name: Upload plan stats (evidence)
        uses: actions/upload-artifact@v4
        with:
          name: "${{ steps.name_artifact.outputs.art_name }}-stats"
          path: ${{ inputs.working_directory }}/plan_stats.json
          retention-days: 7
 
