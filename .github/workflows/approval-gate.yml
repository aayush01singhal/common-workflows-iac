name: "Approval Gate"
 
on:
  workflow_call:
    inputs:
      target_env:
        required: true
        type: string
      change_ref:
        required: true
        type: string
      change_reason:
        required: true
        type: string
 
permissions:
  contents: read
 
jobs:
  approval:
    name: "Approve apply | env=${{ inputs.target_env }} | ref=${{ inputs.change_ref }}"
    runs-on: windows-latest
    timeout-minutes: 1440
    environment: ${{ inputs.target_env }}
 
    steps:
      - name: Approved
        shell: powershell
        run: |
          Write-Host "Approved. Continuing to apply."
