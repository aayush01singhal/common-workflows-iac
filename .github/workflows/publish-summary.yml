
name: "Publish Summary"
 
on:
  workflow_call:
    inputs:
      target_env:
        required: true
        type: string
      change_ref:
        required: true
        type: string
      change_reason:
        required: true
        type: string
      rollback_plan:
        required: true
        type: string
      plan_artifact_name:
        required: true
        type: string
 
permissions:
  contents: read
 
jobs:
  pack:
    name: "Summary | env=${{ inputs.target_env }} | ref=${{ inputs.change_ref }}"
    runs-on: windows-latest
    timeout-minutes: 30
 
    steps:
      - name: Checkout common workflow scripts
        uses: actions/checkout@v4
        with:
          repository: aayush01singhal/common-workflows-iac
          ref: main
          path: _common
 
      - name: Download plan stats artifact
        uses: actions/download-artifact@v4
        with:
          name: "${{ inputs.plan_artifact_name }}-stats"
          path: evidence
 
      - name: Download plan preview artifact
        uses: actions/download-artifact@v4
        with:
          name: "${{ inputs.plan_artifact_name }}-preview"
          path: evidence
 
      - name: Publish Summary to job summary (pre-approval)
        shell: powershell
        run: >
          & "${env:GITHUB_WORKSPACE}\_common\.github\scripts\publish-summary.ps1"
          -TargetEnv "${{ inputs.target_env }}"
          -ChangeRef "${{ inputs.change_ref }}"
          -ChangeReason "${{ inputs.change_reason }}"
          -RollbackPlan "${{ inputs.rollback_plan }}"
          -PlanArtifactName "${{ inputs.plan_artifact_name }}"
          -Repository "${{ github.repository }}"
          -RunId "${{ github.run_id }}"
          -Actor "${{ github.actor }}"
